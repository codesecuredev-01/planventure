name: Test PR Decoration
on:
  pull_request:  # Trigger on PRs to test the decorator
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # CRITICAL for PR decoration
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for Baseline Comparison (Fixed vs New)

      - name: Run CodeSecure Scan
        uses: docker://gcr.io/codesecure-479807/codesecure:1.0.21
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }} # Optional: for AI Grade
        with:
          args: scan . --decorate-pr auto --fail-on critical,high --format markdown
